<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Collaborative Rich Text Editor</title>
<style>
body{margin:0;font-family:Arial,sans-serif;}
#container{display:flex; height:95vh; position:relative;}
#editorContainer{flex:7; display:flex; flex-direction:column; margin-right:5px; position:relative;}
#chatContainer{flex:3; border-left:1px solid #ccc; display:flex; flex-direction:column;}
#chatMessages{flex:1; overflow-y:auto; padding:5px; background:#f9f9f9;}
#chatInput{display:flex; border-top:1px solid #ccc;}
#chatInput input{flex:1; padding:5px;}
#chatInput button{padding:5px;}
.message{margin-bottom:5px;}
.message .user{font-weight:bold; margin-right:5px;}
#toolbar{background:#f2f2f2;padding:5px;display:flex;flex-wrap:wrap;align-items:center;}
#toolbar button,#toolbar select,#toolbar input[type=color],#toolbar input[type=number]{margin:2px;padding:5px;}
#editor{border:1px solid #ccc;padding:10px;min-height:400px;background:white;overflow:auto;position:relative;}
#header,#footer{background:#f9f9f9;padding:5px;border-bottom:1px solid #ccc;}
#footer{border-top:1px solid #ccc;border-bottom:none;}
#statusBar{margin-top:5px;padding:5px;background:#eee;}
.checklist{list-style:none;padding-left:0;}
.checklist li{display:flex;align-items:center;}
.checklist input[type="checkbox"]{margin-right:5px;}
#signaturePicker{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
#signaturePicker div{background:#fff;padding:20px;border-radius:5px; max-width:600px;}
.remoteCursor{position:absolute;font-size:12px;font-weight:bold;opacity:0.7;pointer-events:none;z-index:1000;}
#cursorContainer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
</style>
</head>
<body>

<div id="container">
  <div id="editorContainer">
    <!-- Toolbar -->
    <div id="toolbar">
        <button id="toggleHeaderBtn">Header</button>
       <button id="toggleFooterBtn">Footer</button>


      <button onclick="document.execCommand('bold',false,null)">B</button>
      <button onclick="document.execCommand('italic',false,null)">I</button>
      <button onclick="document.execCommand('underline',false,null)">U</button>
      <button onclick="document.execCommand('strikeThrough', false, null)" style="font-family:Arial; position: relative;">
  <span style="position: relative; display: inline-block; width: 20px; text-align: center;">S
    <span style="position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: black;"></span>
  </span>
</button>


      <button onclick="document.execCommand('undo',false,null)">↺</button>
      <button onclick="document.execCommand('redo',false,null)">↻</button>

      <select onchange="document.execCommand('fontName',false,this.value)">
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Verdana">Verdana</option>
      </select>
      <select onchange="document.execCommand('fontSize',false,this.value)">
        <option value="1">8pt</option>
        <option value="2">10pt</option>
        <option value="3" selected>12pt</option>
        <option value="4">14pt</option>
        <option value="5">18pt</option>
        <option value="6">24pt</option>
        <option value="7">36pt</option>
      </select>

      <!-- ✏️ Text Color Picker -->
<label id="textColorLabel" title="Text Color" style="position: relative; width: 30px; height: 30px; cursor: pointer;">
  <span style="position: absolute; top: 4px; left: 8px; font-weight: bold; font-size: 16px; color: black;">A</span>
  <span style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
        border-radius: 50%; opacity: 0.8;"></span>
  <input type="color" id="textColorPicker" onchange="document.execCommand('foreColor', false, this.value)"
         style="opacity:0; position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;">
</label>

<!-- 🖊️ Highlight Color Picker -->
<label id="highlightColorLabel" title="Highlight Color"
       style="position: relative; width: 30px; height: 30px; cursor: pointer; display: inline-block;">
  <svg viewBox="0 0 64 64" width="28" height="28" style="position:absolute;top:1px;left:1px;">
    <path d="M10 50 L54 6 L58 10 L14 54 L10 50 Z" fill="gray"/>
    <path id="highlightLine" d="M8 58 H56 V62 H8 Z" fill="#ffff00"/>
  </svg>
  <input type="color" id="highlightColorPicker"
         onchange="document.execCommand('hiliteColor', false, this.value);
                   document.getElementById('highlightLine').setAttribute('fill', this.value);"
         style="opacity:0; position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;">
</label>

<!-- 📄 Page Color Picker -->
<label id="pageColorLabel" title="Page Background Color"
       style="position: relative; width: 30px; height: 30px; cursor: pointer; display: inline-block;">
  <svg viewBox="0 0 64 64" width="28" height="28" style="position:absolute;top:1px;left:1px;">
    <rect x="2" y="2" width="60" height="60" rx="3" ry="3"
          fill="white" stroke="black" stroke-width="2"></rect>
    <rect id="pageGapColor" x="6" y="6" width="52" height="52" rx="2" ry="2"
          fill="#ffffff" stroke="none"></rect>
  </svg>
  <input type="color" id="pageColorPicker"
         onchange="document.getElementById('editor').style.backgroundColor=this.value;
                   document.getElementById('pageGapColor').setAttribute('fill', this.value);"
         style="opacity:0; position:absolute; top:0; left:0; width:100%; height:100%; cursor:pointer;">
</label>


      <select id="alignmentDropdown" title="Alignment">
  <option value="">Alignment</option>
  <option value="justifyLeft">Left</option>
  <option value="justifyCenter">Center</option>
  <option value="justifyRight">Right</option>
  <option value="justifyFull">Justify</option>
</select>


      <select onchange="document.getElementById('editor').style.lineHeight=this.value">
        <option value="1">Single</option>
        <option value="1.15">1.15</option>
        <option value="1.5">1.5</option>
        <option value="2">Double</option>
      </select>

      <select id="paraStyle">
        <option value="plain">Plain</option>
        <option value="title">Title</option>
        <option value="subheading">Subheading</option>
        <option value="sub-subheading">Sub-subheading</option>
      </select>

      <select id="listDropdown" title="List">
  <option value="">List</option>
  <option value="insertUnorderedList">• Bulleted List</option>
  <option value="insertOrderedList">1. Numbered List</option>
</select>

      <button onclick="insertChecklist()">☑ Checklist</button>

      <select id="shapeSelect">
        <option value="">Shape</option>
        <option value="rectangle">Rectangle</option>
        <option value="circle">Circle</option>
        <option value="line">Line</option>
      </select>

      <select id="insertSelect">
  <option value="">Insert</option>
  <option value="image">Image</option>
  <option value="video">Video</option>
  <option value="audio">Audio</option>
  <option value="link">Link</option>
  <option value="table">Table</option>
  <option value="chart">Chart</option>
</select>

      <button onclick="insertSignature()">Digital Sign</button>

      <select id="symbolsSelect">
        <option value="">Symbol</option>
        <option value="±">±</option>
        <option value="π">π</option>
        <option value="√">√</option>
        <option value="∑">∑</option>
        <option value="→">→</option>
        <option value="←">←</option>
        <option value="❤️">❤️</option>
      </select>

      

      <select id="orientationSelect">
        <option value="portrait">Portrait</option>
        <option value="landscape">Landscape</option>
      </select>
      <label>Margin:</label>
<select id="marginSide">
  <option value="Top">Top</option>
  <option value="Bottom">Bottom</option>
  <option value="Left">Left</option>
  <option value="Right">Right</option>
</select>

<select id="marginValue">
  <option value="5">5 px</option>
  <option value="10" selected>10 px</option>
  <option value="15">15 px</option>
  <option value="20">20 px</option>
  <option value="30">30 px</option>
</select>


      <label>Zoom:</label><input type="range" id="zoomSlider" min="50" max="200" value="100"><span id="zoomValue">100%</span>
    </div>

    <div id="editor" contenteditable="true"></div>
    <div id="cursorContainer"></div> <!-- Cursor presence overlay -->
    <div id="statusBar">Word Count: <span id="wordCount">0</span></div>
  </div>

  <!-- 💬 Floating Chat Toggle Button -->
<button id="toggleChatBtn" onclick="toggleChat()">💬</button>

<!-- 🗨️ Chat Sidebar -->
<div id="chatBox">
  <div id="chatHeader">
    <span>Team Chat</span>
    <button id="closeChatBtn" onclick="toggleChat()">✖</button>
  </div>
  <div id="chatMessages"></div>
  <div id="chatInputArea">
    <input type="text" id="chatInput" placeholder="Type a message...">
    <button onclick="sendChat()">Send</button>
  </div>
</div>

<style>
/* ---------- CHAT STYLES ---------- */
#chatBox {
  position: fixed;
  top: 0;
  right: 0;
  width: 320px;
  height: 100%;
  background: #fff;
  border-left: 1px solid #ccc;
  box-shadow: -2px 0 8px rgba(0,0,0,0.2);
  transform: translateX(100%);
  transition: transform 0.3s ease-in-out;
  z-index: 1000;
  display: flex;
  flex-direction: column;
}

#chatBox.show {
  transform: translateX(0);
}

#chatHeader {
  background: #007bff;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: bold;
}

#chatMessages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #f9f9f9;
  font-size: 14px;
}

#chatInputArea {
  display: flex;
  border-top: 1px solid #ccc;
}

#chatInput {
  border: none;
  flex: 1;
  padding: 8px;
  font-size: 14px;
}

#chatInput:focus {
  outline: none;
}

#chatInputArea button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  padding: 8px 12px;
}

/* Floating Chat Button */
#toggleChatBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #007bff;
  color: white;
  font-size: 22px;
  border: none;
  box-shadow: 0 3px 6px rgba(0,0,0,0.3);
  cursor: pointer;
  z-index: 1100;
  transition: background 0.2s;
}

#toggleChatBtn:hover {
  background: #0056b3;
}
</style>

<script>
//let currentUser = "User123"; // Replace this dynamically with logged-in user

// ---------------- LIST DROPDOWN ----------------
document.getElementById('listDropdown').addEventListener('change', function() {
  const cmd = this.value;  // get selected command
  if(cmd) document.execCommand(cmd, false, null);  // apply list
  this.value = "";         // reset dropdown to "List"
});


// ---------------- ALIGNMENT DROPDOWN ----------------
document.getElementById('alignmentDropdown').addEventListener('change', function() {
  const cmd = this.value;        // get selected command
  if(cmd) document.execCommand(cmd, false, null);  // apply alignment
  this.value = "";               // reset dropdown to "Alignment"
});



function insertHeader() {
    if(document.getElementById('header')) return;  // avoid duplicates
    const header = document.createElement('div');
    header.id = 'header';
    header.contentEditable = true;
    header.innerText = 'Header';
    header.style.borderBottom = '1px solid #ccc';
    header.style.padding = '5px';
    header.style.backgroundColor = '#f9f9f9';
    editor.parentNode.insertBefore(header, editor);
}
function insertFooter() {
    if(document.getElementById('footer')) return;
    const footer = document.createElement('div');
    footer.id = 'footer';
    footer.contentEditable = true;
    footer.innerHTML = 'Footer - Page <span id="pageNumber">1</span>';
    footer.style.borderTop = '1px solid #ccc';
    footer.style.padding = '5px';
    footer.style.backgroundColor = '#f9f9f9';
    editor.parentNode.appendChild(footer);
}
document.getElementById('toggleHeaderBtn').addEventListener('click', () => {
    let header = document.getElementById('header');
    if(!header) insertHeader();
    else header.style.display = (header.style.display==='none') ? 'block' : 'none';
});

document.getElementById('toggleFooterBtn').addEventListener('click', () => {
    let footer = document.getElementById('footer');
    if(!footer) insertFooter();
    else footer.style.display = (footer.style.display==='none') ? 'block' : 'none';
});



function toggleChat() {
  const chatBox = document.getElementById("chatBox");
  chatBox.classList.toggle("show");
}

function sendChat() {
  const input = document.getElementById("chatInput");
  const msg = input.value.trim();
  if (!msg) return;

  const messages = document.getElementById("chatMessages");
  const p = document.createElement("p");
  p.textContent = currentUser + ": " + msg;
  messages.appendChild(p);

  input.value = "";
  messages.scrollTop = messages.scrollHeight;
}
</script>


<!-- Signature Picker -->
<div id="signaturePicker">
  <div>
    <h3>Select Your Signature</h3>
    <div id="userSignatures" style="display:flex;flex-wrap:wrap;gap:10px;"></div>
    <button onclick="closeSignaturePicker()">Close</button>
  </div>
</div>

<!-- MathJax -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ---------------- VARIABLES ----------------
const editor=document.getElementById('editor');
const currentUser=prompt("Enter your username");
let drawingShape = null;
let startX = 0, startY = 0;
let currentShapeType = null;
const chatMessages=document.getElementById('chatMessages');
const chatInput=document.getElementById('chatText');
let messages=[];

// Dummy signature DB
const signaturesDB={ "alice":["sign1.png"], "bob":["bobSign.png"] };
let selectedSignature=null;

// ---------------- WORD COUNT ----------------
function updateWordCount(){document.getElementById('wordCount').innerText=editor.innerText.trim().split(/\s+/).filter(w=>w.length>0).length;}
editor.addEventListener('input',updateWordCount); updateWordCount();

// ---------------- SHAPE DRAWING ----------------
editor.addEventListener('mousedown', e => {
    if (!currentShapeType) return;

    startX = e.offsetX;
    startY = e.offsetY;

    drawingShape = document.createElement('div');
    drawingShape.style.position = 'absolute';
    drawingShape.style.left = startX + 'px';
    drawingShape.style.top = startY + 'px';
    drawingShape.style.backgroundColor = '#ccc';
    drawingShape.style.border = '1px solid #000';
    drawingShape.style.pointerEvents = 'none';

    if(currentShapeType === 'circle') drawingShape.style.borderRadius = '50%';
    if(currentShapeType === 'line') drawingShape.style.height = '2px';

    editor.appendChild(drawingShape);

    const mouseMoveHandler = evt => {
        const width = evt.offsetX - startX;
        const height = evt.offsetY - startY;

        drawingShape.style.width = Math.abs(width) + 'px';
        if(currentShapeType !== 'line') drawingShape.style.height = Math.abs(height) + 'px';
        if(width < 0) drawingShape.style.left = evt.offsetX + 'px';
        if(height < 0 && currentShapeType !== 'line') drawingShape.style.top = evt.offsetY + 'px';
    };

    const mouseUpHandler = () => {
        editor.removeEventListener('mousemove', mouseMoveHandler);
        editor.removeEventListener('mouseup', mouseUpHandler);
        drawingShape.style.pointerEvents = 'auto';
        drawingShape = null;
        // currentShapeType = null;
        // document.getElementById('shapeSelect').value = '';
    };

    editor.addEventListener('mousemove', mouseMoveHandler);
    editor.addEventListener('mouseup', mouseUpHandler);
});


// ---------------- PARAGRAPH STYLE ----------------
document.getElementById('paraStyle').addEventListener('change', ()=>{
let style=document.getElementById('paraStyle').value;
let size,weight;
switch(style){case'title':size='24px';weight='bold';break;case'subheading':size='18px';weight='bold';break;case'subsubheading':size='14px';weight='600';break;default:size='12px';weight='normal';}
let selection=window.getSelection(); if(selection.rangeCount>0){let range=selection.getRangeAt(0);if(!range.collapsed){let span=document.createElement('span');span.style.fontSize=size;span.style.fontWeight=weight;span.appendChild(range.extractContents());range.insertNode(span);}}editor.focus();
});

// ---------------- SYMBOLS ----------------
document.getElementById('symbolsSelect').addEventListener('change', ()=>{
let val=document.getElementById('symbolsSelect').value; if(val) document.execCommand('insertHTML',false,val); document.getElementById('symbolsSelect').value='';
});
// ---------------- SHAPES ----------------
document.getElementById('shapeSelect').addEventListener('change', e => {
    currentShapeType = e.target.value; // rectangle, circle, line
});
document.getElementById('shapeSelect').addEventListener('change', e => {
    currentShapeType = e.target.value; // rectangle, circle, line
    if(currentShapeType) {
        editor.style.cursor = 'crosshair'; // plus sign while drawing
    } else {
        editor.style.cursor = 'text'; // normal text cursor
    }
});
// ---------------- INSERT DROPDOWN ----------------
document.getElementById('insertSelect').addEventListener('change', function() {
    const val = this.value;
    switch(val){
        case 'image':
            insertImage();
            break;
        case 'video':
            insertVideo();
            break;
        case 'audio':
            insertAudio();
            break;
        case 'link':
            insertLink();
            break;
        case 'table':
            insertTable();
            break;
        case 'chart':
            insertChart();
            break;
    }
    this.value = ''; // reset dropdown
});



// ---------------- CHECKLIST ----------------
function insertChecklist(){let selection=window.getSelection(); if(selection.rangeCount>0){let range=selection.getRangeAt(0); const li=document.createElement('li'); const cb=document.createElement('input'); cb.type='checkbox'; li.appendChild(cb); li.appendChild(range.extractContents()); const ul=document.createElement('ul'); ul.className='checklist'; ul.appendChild(li); range.insertNode(ul);}}

// ---------------- MEDIA ----------------
function insertLink(){let url=prompt('URL'); if(url) document.execCommand('createLink',false,url);}
function insertImage(){let url=prompt('Image URL'); if(url){let floatOption=prompt('Float? left,right,none','none'); let html=`<img src="${url}" style="max-width:300px;${floatOption!=='none'?`float:${floatOption};margin:5px;`:""}">`; document.execCommand('insertHTML',false,html);}}
function insertAudio(){let url=prompt('Audio URL'); if(url) document.execCommand('insertHTML',false,`<audio controls src="${url}" style="max-width:300px;"></audio>`);}
function insertVideo(){let url=prompt('MP4 URL'); if(url) document.execCommand('insertHTML',false,`<video controls width="360"><source src="${url}" type="video/mp4"></video>`);}
// ---------------- DIGITAL SIGN ----------------
function insertSignature() {
    const url = prompt("Enter Signature URL or leave blank to upload:");
    if (url) {
        placeSignatureFromURL(url);
    } else {
        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = "image/*";
        fileInput.onchange = function() {
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                placeSignatureFromURL(e.target.result);
            };
            reader.readAsDataURL(file);
        };
        fileInput.click();
    }
}

function placeSignatureFromURL(src) {
    const img = document.createElement("img");
    img.src = src;
    img.style.maxWidth = "150px";
    img.style.position = "absolute";

    alert("Click anywhere in the editor to place your signature.");
    editor.style.cursor = "crosshair";

    function place(e) {
        const rect = editor.getBoundingClientRect();
        img.style.left = (e.clientX - rect.left) + "px";
        img.style.top = (e.clientY - rect.top) + "px";
        editor.appendChild(img);
        editor.style.cursor = "text";
        editor.removeEventListener("click", place);
    }

    editor.addEventListener("click", place);
}

// ---------------- TABLE ----------------
function insertTable(){let rows=prompt('Rows',2),cols=prompt('Cols',2); if(rows&&cols){let html='<table border="1" style="border-collapse:collapse;">'; for(let r=0;r<rows;r++){html+='<tr>';for(let c=0;c<cols;c++){html+='<td>&nbsp;&nbsp;&nbsp;</td>'} html+='</tr>'} html+='</table><br>'; document.execCommand('insertHTML',false,html);}}

// ---------------- CHART ----------------
function insertChart(){let type=prompt('Chart type (bar,line,pie)','bar'); let labels=prompt('Comma-separated labels','Jan,Feb,Mar').split(','); let data=prompt('Comma-separated values','10,20,30').split(',').map(Number); let cid='chart'+Date.now(); let html=`<canvas id="${cid}" width="400" height="300"></canvas>`; document.execCommand('insertHTML',false,html); setTimeout(()=>{new Chart(document.getElementById(cid).getContext('2d'),{type:type,data:{labels:labels,datasets:[{label:'Dataset',data:data,backgroundColor:'rgba(0,123,255,0.5)'}]}});},100);}

// ---------------- MARGINS & ORIENTATION ----------------
const margins = { Top: 10, Bottom: 10, Left: 10, Right: 10 };

const marginSide = document.getElementById('marginSide');
const marginValue = document.getElementById('marginValue');

function updateEditorMargins() {
  editor.style.padding = `${margins.Top}px ${margins.Right}px ${margins.Bottom}px ${margins.Left}px`;
}

marginSide.addEventListener('change', () => {
  marginValue.value = margins[marginSide.value];
});

marginValue.addEventListener('change', () => {
  margins[marginSide.value] = parseInt(marginValue.value);
  updateEditorMargins();
});

// Initial apply
updateEditorMargins();


// ---------------- ZOOM ----------------
const zoomSlider=document.getElementById('zoomSlider'); const zoomValue=document.getElementById('zoomValue');
zoomSlider.addEventListener('input',()=>{editor.style.transform=`scale(${zoomSlider.value/100})`; editor.style.transformOrigin='top left'; zoomValue.innerText=zoomSlider.value+'%';});

// ---------------- CHAT ----------------
function renderMessages(){chatMessages.innerHTML=''; messages.forEach(msg=>{const div=document.createElement('div'); div.className='message'; div.innerHTML=`<span class="user">${msg.user}:</span> ${msg.text}`; chatMessages.appendChild(div);}); chatMessages.scrollTop=chatMessages.scrollHeight;}
function sendChat(){const text=chatInput.value.trim(); if(!text) return; messages.push({user:currentUser,text}); chatInput.value=''; renderMessages();}
renderMessages();

// ---------------- DIGITAL SIGN ----------------
function openSignaturePicker(){
  const container=document.getElementById("userSignatures"); container.innerHTML="";
  const userSigns=signaturesDB[currentUser]||[];
  userSigns.forEach(url=>{
    const img=document.createElement("img"); img.src=url; img.style.width="100px"; img.style.cursor="pointer";
    img.onclick=()=>{selectedSignature=url; closeSignaturePicker(); enableStampPlacement();};
    container.appendChild(img);
  });
  document.getElementById("signaturePicker").style.display="flex";
}
function closeSignaturePicker(){document.getElementById("signaturePicker").style.display="none";}
function enableStampPlacement(){if(!selectedSignature) return; alert("Click anywhere in the editor to place your signature."); editor.style.cursor="crosshair"; editor.addEventListener("click",placeSignatureStamp);}
function placeSignatureStamp(e){const rect=editor.getBoundingClientRect(); const x=e.clientX-rect.left; const y=e.clientY-rect.top; const img=document.createElement("img"); img.src=selectedSignature; img.style.position="absolute"; img.style.left=x+"px"; img.style.top=y+"px"; img.style.maxWidth="150px"; img.style.pointerEvents="none"; editor.appendChild(img); editor.style.cursor="text"; selectedSignature=null; editor.removeEventListener("click",placeSignatureStamp);}
// ---------------- DIGITAL SIGN STAMP ----------------
let selectedStamp = null;

function insertSignatureStamp() {
    const url = prompt("Enter Signature URL or leave blank to upload:");}

// ---------------- CURSOR PRESENCE ----------------
const cursorContainer=document.getElementById('cursorContainer');
const userColors={}; const remoteCursors={};
function getUserColor(username){if(!userColors[username]){const colors=['red','green','blue','orange','purple','teal','brown'];userColors[username]=colors[Object.keys(userColors).length%colors.length];} return userColors[username];}
function updateRemoteCursor(username,x,y){remoteCursors[username]={x,y}; renderCursors();}
function renderCursors(){cursorContainer.innerHTML=''; for(const [user,pos] of Object.entries(remoteCursors)){if(user===currentUser) continue; const div=document.createElement('div'); div.className='remoteCursor'; div.style.color=getUserColor(user); div.style.left=pos.x+'px'; div.style.top=pos.y+'px'; div.innerText=user; cursorContainer.appendChild(div);}}
editor.addEventListener('mouseup',sendCursorPosition);
editor.addEventListener('keyup',sendCursorPosition);
function sendCursorPosition(){const selection=window.getSelection(); if(selection.rangeCount===0) return; const range=selection.getRangeAt(0).cloneRange(); const rect=range.getBoundingClientRect(); const editorRect=editor.getBoundingClientRect(); const x=rect.left-editorRect.left; const y=rect.top-editorRect.top; /* send to server */} // demo
</script>
